name: "HA NILM Detector"
description: "Detect appliances from power consumption patterns (BETA - Experimental project in active development)"
version: "0.6.34"
slug: "ha_nilm_detector"
startup: application
boot: auto
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_title: HA NILM
panel_icon: mdi:chart-line
arch:
  - amd64
  - aarch64
  - armv7
init: false
options:
  language: "de"
  storage:
    base_path: "/data/ha_nilm_detector"
  learning:
    auto_pipeline_enabled: true
    auto_pipeline_interval_minutes: 30
    ai_enabled: true
    ml_enabled: true
    shape_matching_enabled: true
    online_learning_enabled: true
    delta_on_w: 30.0
    delta_off_w: 12.0
    max_gap_s: 6.0
    pattern_match_threshold: 0.45
    ml_confidence_threshold: 0.60
  home_assistant:
    phase_entities:
      l1: ""
      l2: ""
      l3: ""
schema:
  language: list(de|en)?
  log_level: list(debug|info|warning|error)?
  log_file: str?
  max_log_backups: int(1,10)?
  update_interval_seconds: int(1,60)?
  home_assistant:
    url: str?
    phase_entities:
      l1: str?
      l2: str?
      l3: str?
    token: password?
  learning:
    enabled: bool?
    on_threshold_w: float(10,1000)?
    off_threshold_w: float(5,500)?
    min_cycle_seconds: int(1,600)?
    auto_pipeline_enabled: bool?
    auto_pipeline_interval_minutes: int(5,1440)?
    ai_enabled: bool?
    ml_enabled: bool?
    shape_matching_enabled: bool?
    online_learning_enabled: bool?
    delta_on_w: float(5,1000)?
    delta_off_w: float(2,500)?
    max_gap_s: float(1,120)?
    pattern_match_threshold: float(0.1,0.95)?
    ml_confidence_threshold: float(0.1,0.99)?
  storage:
    enabled: bool?
    base_path: str?
    retention_days: int(1,365)?
    db_path: str?
    patterns_db_path: str?
    learning_warmup_minutes: int(1,1440)?
