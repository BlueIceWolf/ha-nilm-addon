name: "HA NILM Detector"
description: "Detect appliances from power consumption patterns"
version: "0.2.5"
slug: "ha_nilm_detector"
startup: application
boot: auto
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_title: HA NILM
panel_icon: mdi:chart-line
arch:
  - amd64
  - aarch64
  - armv7
init: false
options:
  log_level: info
  power_source: home_assistant_rest
  update_interval_seconds: 5
  home_assistant:
    url: http://supervisor/core/api
    phase_entities:
      l1: ""
      l2: ""
      l3: ""
    token: ""
  learning:
    enabled: true
    on_threshold_w: 50.0
    off_threshold_w: 25.0
  storage:
    retention_days: 30
schema:
  log_level: list(debug|info|warning|error)
  power_source: list(mock|home_assistant_rest)
  update_interval_seconds: int(1,60)
  home_assistant:
    url: str
    phase_entities:
      l1: str?
      l2: str?
      l3: str?
    token: password?
  learning:
    enabled: bool
    on_threshold_w: float(10,1000)
    off_threshold_w: float(5,500)
  storage:
    retention_days: int(1,365)
